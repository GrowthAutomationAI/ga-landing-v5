# CloudCannon configuration for ga-landing-v5
# Static HTML site — no SSG

paths:
  uploads: images/uploads

# Collections
collections_config:
  pages:
    path: ""
    output: true
    url: "/[slug]/"
    glob:
      - "*.html"
      - "!admin/**"
    icon: wysiwyg
    _enabled_editors:
      - visual
      - content
      - source
    filter:
      exclude:
        - admin/
  data:
    path: _data
    output: false
    disable_add: true
    disable_remove: true
    icon: settings

# Sidebar grouping
collection_groups:
  - heading: Pages
    collections:
      - pages
  - heading: Data
    collections:
      - data

# Visual editing — editable region toolbar options
_editables:
  text:
    bold: true
    italic: true
    link: true
    bulletedlist: true
    numberedlist: true
  block:
    bold: true
    italic: true
    link: true
    bulletedlist: true
    numberedlist: true
    format: p h1 h2 h3 h4
    image: true
    undo: true
    redo: true
  image:
    width: 1600
    height: 1600
    resize_style: contain
    expandable: true
    mime_type: image/jpeg,image/png,image/webp
